name: Build & Push Docker images

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: prod/Dockerfile.web
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/poliquiz-web:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/poliquiz-web:latest

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: prod/Dockerfile.backend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/poliquiz-backend:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/poliquiz-backend:latest
